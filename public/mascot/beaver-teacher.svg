<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" role="img" aria-labelledby="title desc">
  <title id="title">Beaver teacher explaining sentence analysis</title>
  <desc id="desc">A line-art beaver holding a ruler and pointing to a white board with an example sentence analysis.</desc>
  <defs>
    <style>
      .ink { stroke: #111; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #111; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .soft { stroke: #7b7b74; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .fill-white { fill: #fff; }
      .fill-soft { fill: #f3f3f1; }
      .fill-tail { fill: #dededb; }
      .text { fill: #111; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>

  <!-- White board -->
  <g>
    <rect x="42" y="58" width="370" height="254" rx="24" class="fill-white ink" />
    <path d="M82 120 H370" class="soft" />
    <text x="78" y="102" class="text" font-size="22" font-weight="800">parse(sentence)</text>
    <text x="78" y="154" class="text" font-size="21" font-weight="800">I read docs carefully.</text>
    <text x="78" y="194" class="text" font-size="18">verb      → read</text>
    <text x="78" y="226" class="text" font-size="18">args      → I, docs</text>
    <text x="78" y="258" class="text" font-size="18">modifier  → carefully</text>
    <circle cx="356" cy="190" r="8" fill="#111" />
  </g>

  <!-- Board legs -->
  <path d="M92 312 L70 390 M362 312 L390 390 M128 350 H356" class="soft" fill="none" />

  <!-- Beaver tail -->
  <g>
    <path d="M548 292 C614 280 629 346 588 396 C546 448 488 412 506 356 C513 331 525 309 548 292Z" class="fill-tail ink" />
    <path d="M530 326 L591 389 M565 304 L610 349 M516 366 L556 413 M548 314 L520 395 M583 313 L541 421" class="soft" fill="none" />
  </g>

  <!-- Beaver body -->
  <ellipse cx="476" cy="316" rx="74" ry="100" class="fill-white ink" />
  <path d="M428 376 C454 396 500 398 526 372" class="soft" fill="none" />

  <!-- Feet -->
  <ellipse cx="424" cy="408" rx="28" ry="18" class="fill-soft ink" />
  <ellipse cx="516" cy="408" rx="28" ry="18" class="fill-soft ink" />

  <!-- Head and ears -->
  <circle cx="470" cy="178" r="78" class="fill-white ink" />
  <circle cx="404" cy="126" r="29" class="fill-white ink" />
  <circle cx="535" cy="124" r="29" class="fill-white ink" />
  <path d="M399 124 C407 113 420 113 428 124 M530 124 C539 113 552 113 560 124" class="soft" fill="none" />
  <path d="M444 100 C455 80 474 82 482 62 M480 98 C494 79 510 84 518 66" class="thin" fill="none" />

  <!-- Face -->
  <path d="M423 166 C430 156 442 156 449 166 M492 166 C500 156 512 156 519 166" class="thin" fill="none" />
  <circle cx="436" cy="184" r="8" fill="#111" />
  <circle cx="505" cy="184" r="8" fill="#111" />
  <circle cx="436" cy="181" r="2.6" fill="#fff" />
  <circle cx="505" cy="181" r="2.6" fill="#fff" />
  <circle cx="436" cy="184" r="24" fill="none" class="thin" />
  <circle cx="505" cy="184" r="24" fill="none" class="thin" />
  <path d="M460 183 H481" class="thin" fill="none" />
  <path d="M468 203 C478 199 489 203 491 214 C486 224 474 226 466 216 C464 211 464 207 468 203Z" fill="#111" />
  <path d="M479 222 V246 M458 242 C466 254 476 255 482 246 M482 246 C491 255 503 253 510 242" class="thin" fill="none" />
  <path d="M468 247 V270 H482 V247" class="fill-white thin" />
  <path d="M404 212 H364 M406 228 H363 M535 212 H575 M532 228 H574" class="thin" fill="none" />

  <!-- Arms -->
  <path d="M422 284 C384 276 374 242 398 222" class="fill-white ink" fill="none" />
  <path d="M520 282 C548 266 558 240 546 216" class="fill-white ink" fill="none" />
  <circle cx="399" cy="222" r="16" class="fill-white ink" />
  <circle cx="546" cy="216" r="16" class="fill-white ink" />

  <!-- Ruler pointing to board -->
  <g transform="rotate(25 378 198)">
    <rect x="330" y="190" width="116" height="14" rx="5" class="fill-white ink" />
    <path d="M348 190 V202 M366 190 V199 M384 190 V202 M402 190 V199 M420 190 V202" class="thin" />
  </g>

  <!-- Ground -->
  <path d="M360 430 C420 448 520 448 590 426" class="soft" fill="none" />
</svg>
